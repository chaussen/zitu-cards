<!--
  ============================================================
  字图 ZìTú — SVG Symbol Library v1.0
  ============================================================

  This block defines every reusable SVG used across the pack:
    • #mz         — the 米字格 (rice-character) grid
    • #m-<id>     — per-character mnemonic scenes (gold-line art with cinnabar accents)
    • #o-<id>     — per-character oracle-bone / bronze stylised glyphs
                    (used in the etymology strip + poster)

  HOW TO USE
  ------------------------------------------------------------
  Paste the <svg width="0" ...><defs>…</defs></svg> block below
  near the top of <body> in every new pack HTML file (after the
  screen cover, before the print sheets). Then reference symbols
  with <use href="#id"/>:

    <svg class="mizige"><use href="#mz"/></svg>
    <svg viewBox="0 0 60 70"><use href="#m-ren"/></svg>
    <svg viewBox="0 0 30 36" style="color:var(--paper-on-dk)"><use href="#o-ren"/></svg>

  ADDING NEW CHARACTERS
  ------------------------------------------------------------
  Add two new <symbol> elements per character:

    1) Mnemonic scene  (id "m-<char-pinyin>", viewBox "0 0 60 70")
       Style: gold lines stroke-width 2, round caps/joins, plus
       1-2 cinnabar accents (#b83a25). 3-5 strokes max — the
       scene should read as the character's *meaning*, ideally
       echoing the character's own stroke shapes.

    2) Oracle/bronze glyph  (id "o-<char-pinyin>", viewBox "0 0 30 36")
       Style: stroke="currentColor" so it picks up the panel
       colour. Line weight 1.6-1.8, no fill. Should look like
       a primitive pictograph — closer to the meaning than to
       the modern character shape.

  Naming uses pinyin (without tone marks). Disambiguate with
  a suffix only when two characters in a pack share a syllable:
  e.g. #m-xin (心), #m-xin-new (新) if both appeared together.

  TWO STAGES PER CHARACTER ARE ENOUGH
  ------------------------------------------------------------
  The etymology strip shows 5 stages but only the first two
  (oracle bone + bronze) need custom SVG. Stages 3-5 (seal /
  clerical / regular) reuse the modern character rendered in
  different fonts (#han-seal, #han-clerc, default Kaiti). You
  can re-use the same oracle SVG for both stages 1 and 2 to
  save effort, as Pack 01 does.
  ============================================================
-->
